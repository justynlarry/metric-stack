groups:
  - name: platform_health
    interval: 30s
    rules:
      # Service Down Alerts
      - alert: PrometheusDown
        expr: up{service="prometheus"} == 0
        for: 1m
        labels:
          severity: critical
          tenant: internal
          instance: prometheus
        annotations:
          summary: "Prometheus is down"
          description: "The monitoring platform itself is unavailable."

      - alert: LokiDown
        expr: up{service="loki"} == 0
        for: 1m
        labels:
          severity: critical
          tenant: internal
          instance: loki
        annotations:
          summary: "Loki is down."
          description: "Log aggregation is unavailable."

      - alert: GrafanaDown
        expr: up{service="grafana"} == 0
        for: 1m
        labels:
          severity: warning
          tenant: internal
          instance: grafana
        annotations:
          summary: "Grafana is down."
          description: "Dashboards are unavailable."

      - alert: MinIODown
        expr: up{service="minio"} == 0
        for: 1m
        labels:
          severity: critical
          tenant: internal
          instance: minio
        annotations:
          summary: "MinIO is down."
          description: "Object storage is unavailable - Loki cannot store logs."

      - alert: NginxDown
        expr: up{service="nginx"} == 0
        for: 1m
        labels:
          severity: critical
          tenant: internal
          instance: nginx
        annotations:
          summary: "Nginx is down."
          description: "Reverse proxy / gateway is unavailable."

      - alert: AlertmanagerDown
        expr: up{service="alertmanager"} == 0
        for: 1m
        labels:
          severity: critical
          tenant: internal
          instance: alertmanager
        annotations:
          summary: "Alertmanager is down."
          description: "Alert routing and notifications are unavailable."

      - alert: CadvisorDown
        expr: up{service="cadvisor"} == 0
        for: 1m
        labels:
          severity: critical
          tenant: internal
          instance: cadvisor
        annotations:
          summary: "cAdvisor is down."
          description: "Container metrics collection is unavailable."

      - alert: BlackboxDown
        expr: up{service="blackbox"} == 0
        for: 1m
        labels:
          severity: critical
          tenant: internal
          instance: blackbox
        annotations:
          summary: "Blackbox Exporter is down."
          description: "Website/endpoint probing is unavailable."

      - alert: MonitoringVMHighMemory
        expr: |
          (1 - (node_memory_MemAvailable_bytes{tenant="internal", role="control-plane"} /
                node_memory_MemTotal_bytes{tenant="internal", role="control-plane"})) * 100 > 85
        for: 5m
        labels:
          severity: warning
          tenant: internal
          instance: monitoring-vm
        annotations:
          summary: "Monitoring VM memory usage high."
          description: "Memory usage is {{ $value }}%"

      - alert: MonitoringVMHighDisk
        expr: |
          (1 - (node_filesystem_avail_bytes{tenant="internal", role="control-plane", fstype!~"tmpfs|fuse.*"} /
                node_filesystem_size_bytes{tenant="internal", role="control-plane", fstype!~"tmpfs|fuse.*"})) * 100 > 85
        for: 10m
        labels:
          severity: warning
          tenant: internal
          instance: monitoring-vm
        annotations:
          summary: "Monitoring VM disk usage high."
          description: "Disk usage is {{ $value }}%"

      - alert: PrometheusScrapeFailures
        expr: up{tenant!="internal"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Prometheus cannot scrape {{ $labels.instance }}"
          description: "Target {{ $labels.instance }} ({{ $labels.tenant }}) has been down for 5 minutes."
