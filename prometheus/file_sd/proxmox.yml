## Exporter for Proxmox Nodes
## Note: the /pve endpoint reports metrics for the entire Proxmox cluster
## from whichever node you scrape, so only one node per cluster is active
## here to avoid triplicated metrics — the other nodes are commented out
## on purpose, not missing coverage.

- targets:
    - 192.0.2.10:9221
  labels:
    tenant: homelab
    cluster: homelab-physical
    instance: proxmox01
    environment: server
    platform: proxmox_ve
    host: proxmox01
    role: proxmox_ve
    exporter: proxmox

